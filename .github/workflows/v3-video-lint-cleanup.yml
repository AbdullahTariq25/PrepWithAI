name: V3 video lint cleanup

on:
  push:
    branches: [ai/production-hardening-v3]
    paths:
      - .github/workflows/v3-video-lint-cleanup.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/production-hardening-v3
          fetch-depth: 0

      - name: Repair camera lifecycle and remove stale lint suppression
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/(dashboard)/interview/[id]/video/page.tsx')
          text = path.read_text(encoding='utf-8-sig')

          old = '''  useEffect(() => {
    navigator.mediaDevices
      .getUserMedia({ video: true, audio: true })
      .then((s) => {
        setStream(s);
        if (userVideoRef.current) userVideoRef.current.srcObject = s;
      })
      .catch(() => setCamOn(false));
    return () => {
      stream?.getTracks().forEach((t) => t.stop());
    };
  }, []);'''

          new = '''  useEffect(() => {
    let mediaStream: MediaStream | null = null;

    navigator.mediaDevices
      .getUserMedia({ video: true, audio: true })
      .then((nextStream) => {
        mediaStream = nextStream;
        setStream(nextStream);
        if (userVideoRef.current) userVideoRef.current.srcObject = nextStream;
      })
      .catch(() => setCamOn(false));

    return () => {
      mediaStream?.getTracks().forEach((track) => track.stop());
    };
  }, []);'''

          if old not in text:
              raise SystemExit('Expected camera lifecycle block not found')

          text = text.replace(old, new, 1)
          text = text.replace(
              '    // eslint-disable-next-line react-hooks/exhaustive-deps\n  }, [isListening]);',
              '  }, [isListening]);',
              1,
          )
          path.write_text(text)
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/'(dashboard)'/interview/'[id]'/video/page.tsx
          git diff --cached --quiet || git commit -m "fix: clean up video media lifecycle"
          git push origin HEAD:ai/production-hardening-v3
