name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "ai/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXTAUTH_SECRET: ci-only-secret-not-used-in-production
  AUTH_SECRET: ci-only-secret-not-used-in-production
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
