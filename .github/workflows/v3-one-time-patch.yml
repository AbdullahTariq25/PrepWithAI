name: Production hardening v3 one-time patch

on:
  push:
    branches: [ai/production-hardening-v3]
    paths:
      - .github/workflows/v3-one-time-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/production-hardening-v3
          fetch-depth: 0

      - name: Apply precise consistency fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('src/app/api/interview/[id]/chat/route.ts'): [
                  ('const rateCheck = rateLimitChat(user.id);', 'const rateCheck = await rateLimitChat(user.id);'),
              ],
              Path('src/lib/constants.ts'): [
                  ('export const APP_TAGLINE = "From your first line of code → to your first $200K job offer.";',
                   'export const APP_TAGLINE = "Practice deliberately. Improve with evidence.";'),
                  ('description: "3-hour FAANG simulation — all types, multiple interviewers",',
                   'description: "Compact multi-stage simulation across technical and behavioral signals",'),
              ],
          }

          for path, edits in replacements.items():
              text = path.read_text()
              original = text
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f'Missing expected text in {path}: {old}')
                  text = text.replace(old, new, 1)
              if text != original:
                  path.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/interview/[id]/chat/route.ts src/lib/constants.ts
          git diff --cached --quiet || git commit -m "fix: complete distributed rate limiting and remove misleading claims"
          git push origin HEAD:ai/production-hardening-v3
